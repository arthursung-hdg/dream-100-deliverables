<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!--
  ============================================================================
  DREAM 100 · PHASE 3 · WEBINAR SURVEY PAGE (TEMPLATE)  ·  step 2 of 3
  ============================================================================
  Doctrine: SIMPLE. A plain one-question-at-a-time questionnaire. Nothing fancy.

  SEPARATION OF CONTENT AND ENGINE (important):
    - The VISUAL SHELL + the QUIZ ENGINE (render loop, scoring, routing) live in
      this file and never change prospect to prospect.
    - All prospect-specific CONTENT lives in ONE injected block: the `SURVEY`
      object at the top of the <script>. The Phase 3 skill GENERATES that block
      (questions, answer options, fit-weights, qualify threshold, result copy,
      brand, booking URL) and injects it here. Nothing else needs editing.

  Flow: register -> [THIS survey] -> qualified leads see "Book My Call",
  everyone else routes straight to the thank-you page.
  ============================================================================
-->
<title>One Quick Step · Everstead Capital</title>
<meta name="description" content="A few quick questions to confirm your seat for the private training.">

<!-- ======================= META PIXEL (base — PageView only) =======================
     Retargeting + funnel visibility. SINGLE SOURCE: the Phase 3 skill injects the client's
     Pixel ID — the SAME [META_PIXEL_ID] used on all four funnel pages. The conversion
     "Lead" event fires ONLY on the two thank-you pages, never here. -->
<script>
  !function(f,b,e,v,n,t,s)
  {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
  n.callMethod.apply(n,arguments):n.queue.push(arguments)};
  if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
  n.queue=[];t=b.createElement(e);t.async=!0;
  t.src=v;s=b.getElementsByTagName(e)[0];
  s.parentNode.insertBefore(t,s)}(window, document,'script',
  'https://connect.facebook.net/en_US/fbevents.js');
  fbq('init', '[META_PIXEL_ID]');   /* <- skill injects the client's Pixel ID */
  fbq('track', 'PageView');
</script>
<noscript><img height="1" width="1" style="display:none"
  src="https://www.facebook.com/tr?id=[META_PIXEL_ID]&ev=PageView&noscript=1"/></noscript>
<!-- ===================== END META PIXEL ===================== -->

<style>
  :root{
    /* THEME — Everstead Capital: deep navy primary + terracotta accent (pixel-sampled).
       Sampled accent #DDAC8A deepened to #a66a38 for legible buttons/links; tan kept as
       --accent-soft. Identical block across all four funnel pages. */
    --brand:#0a1f44; --brand-deep:#06132e; --brand-soft:#24386a;
    --accent:#a66a38; --accent-soft:#ddac8a; --accent-deep:#834f27;
    --brand-rgb:10,31,68; --accent-rgb:166,106,56;
    --bg:#f4efe6; --surface:#ffffff; --ink:#1a1a1a; --ink-soft:#59554c;
    --ink-faint:#8a8578; --line:#d8d0bd; --line-soft:#eae3d3; --green:#1f9d52;
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:'Inter',-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;
    font-size:17px;line-height:1.6;-webkit-font-smoothing:antialiased;
    min-height:100vh;display:flex;flex-direction:column;}
  h1,h2,h3{font-family:'Playfair Display',Georgia,serif;letter-spacing:-0.015em;line-height:1.15;margin:0;}

  .stage{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px;}
  .card{width:100%;max-width:640px;background:var(--surface);border:1px solid var(--line);border-top:5px solid var(--accent);
    border-radius:16px;box-shadow:0 24px 60px rgba(0,8,40,0.10);padding:38px 40px 34px;}

  /* intro + progress */
  .lead{text-align:center;margin-bottom:22px;}
  .lead .kick{display:inline-block;font-size:11px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--accent-deep);background:rgba(var(--accent-rgb),0.10);padding:6px 14px;border-radius:999px;margin-bottom:12px;}
  .lead p{font-size:14.5px;color:var(--ink-soft);margin:8px 0 0;}
  .pbar{height:7px;background:var(--line-soft);border-radius:999px;overflow:hidden;margin-bottom:8px;}
  .pbar i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--accent-soft));border-radius:999px;transition:width .35s ease;}
  .pcount{font-size:12px;letter-spacing:0.04em;text-transform:uppercase;color:var(--ink-faint);text-align:right;}

  /* question */
  .q-wrap{margin-top:26px;}
  .q-num{font-size:12px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--accent-deep);margin-bottom:10px;}
  .q-text{font-size:25px;font-weight:700;color:var(--brand);margin-bottom:22px;}
  .opts{display:flex;flex-direction:column;gap:11px;}
  .opt{display:flex;align-items:center;gap:13px;width:100%;text-align:left;cursor:pointer;font-family:inherit;font-size:16px;color:var(--ink);
    background:#fff;border:1.5px solid var(--line);border-radius:11px;padding:15px 17px;transition:border-color .12s ease,background .12s ease,transform .04s ease;}
  .opt:hover{border-color:var(--accent);background:rgba(var(--accent-rgb),0.04);}
  .opt:active{transform:translateY(1px);}
  .opt .dot{flex:none;width:20px;height:20px;border-radius:50%;border:2px solid var(--line);transition:border-color .12s ease,background .12s ease;}
  .opt.sel{border-color:var(--accent);background:rgba(var(--accent-rgb),0.08);}
  .opt.sel .dot{border-color:var(--accent);background:var(--accent);box-shadow:inset 0 0 0 3px #fff;}
  .nav{display:flex;justify-content:space-between;align-items:center;margin-top:24px;}
  .back{background:none;border:none;cursor:pointer;font-family:inherit;font-size:14px;color:var(--ink-faint);padding:6px 2px;}
  .back:hover{color:var(--brand);}
  .back[disabled]{opacity:0;pointer-events:none;}
  .micro{font-size:12px;color:var(--ink-faint);}

  /* result: qualified -> book a call */
  .result{display:none;text-align:center;padding:6px 4px 4px;}
  .result.show{display:block;}
  .result .crest{width:62px;height:62px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:30px;margin:0 auto 18px;background:rgba(var(--accent-rgb),0.10);color:var(--accent-deep);}
  .result h2{font-size:28px;color:var(--brand);margin-bottom:12px;}
  .result p{font-size:16px;color:var(--ink-soft);max-width:460px;margin:0 auto 8px;}
  /* primary button — used by "Complete Survey" on the last question */
  .btn{display:block;width:100%;border:none;cursor:pointer;font-family:inherit;background:var(--accent);color:#fff;font-size:16.5px;font-weight:700;
    letter-spacing:0.02em;padding:16px 22px;border-radius:9px;text-decoration:none;text-align:center;transition:background .15s ease;}
  .btn:hover{background:var(--accent-deep);}
  .btn[disabled]{opacity:0.45;cursor:not-allowed;}
  .btn[disabled]:hover{background:var(--accent);}
  #completeBtn{margin-top:22px;}

  @media(max-width:560px){
    .card{padding:30px 22px;}
    .q-text{font-size:22px;}
  }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;0,800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

  <div class="stage">
    <div class="card">

      <!-- intro + progress -->
      <div class="lead">
        <span class="kick">You're almost in</span>
        <div class="pbar"><i id="pfill"></i></div>
        <p class="pcount" id="pcount">Question 1 of 8</p>
        <p id="leadnote">Your seat is on hold.</p>
        <p>Answer a few quick questions so we can tailor the session to you.</p>
      </div>

      <!-- question (rendered by the engine) -->
      <div class="q-wrap" id="quiz">
        <div class="q-num" id="qnum">Question 1</div>
        <h2 class="q-text" id="qtext">…</h2>
        <div class="opts" id="opts"></div>
        <!-- shown only on the last question, for a clear cognitive finish -->
        <button class="btn" id="completeBtn" type="button" style="display:none;">Complete Survey →</button>
        <div class="nav">
          <button class="back" id="back">← Back</button>
          <span class="micro">Takes under 60 seconds</span>
        </div>
      </div>

    </div>
  </div>

  <script>
    // ========================================================================
    // CONTENT BLOCK — GENERATED AND INJECTED BY THE DREAM 100 PHASE 3 SKILL.
    // This is the ONLY prospect-specific part of the file. The engine below
    // never changes; the skill only rewrites this SURVEY object.
    //
    // Built from: 01-audience-and-pains.md (ICP, the 5 pains, qualification
    //             criteria) + 03-webinar-angle.md (the training being confirmed).
    // Authoring rules:
    //   - 6 to 8 questions. Order: easy opener -> pain agitation / qualification
    //     -> intent. Mirror the client's own quiz where one exists.
    //   - Each option is [label, fitWeight]. Higher weight = stronger fit.
    //   - qualify = total score at/above which the lead counts as QUALIFIED.
    //     Tune it to roughly the top third of plausible score totals.
    //
    // ROUTING (no in-page result screen): on completion the engine redirects.
    //   score >= qualify  -> webinar-thank-you-call.html  (thank-you + book-a-call)
    //   otherwise         -> webinar-thank-you.html        (plain thank-you)
    // BOTH pages fire the same Meta "Lead" event on load. Booking copy + the
    // scheduler URL live on the thank-you-call page, not here.
    // ========================================================================
    const SURVEY = {
      questions: [
        // Q1 warm-up (location) — ceiling 0-1
        { q:"First, where are you located?",
          opts:[ ["Pennsylvania",1],["Maryland",1],["A neighboring state",1],["Somewhere else in the U.S.",0] ] },
        // Q2 segmentation (life-stage) — ceiling 0-3
        { q:"Which best describes you right now?",
          opts:[ ["Still working, planning my exit",3],["Just retired",3],["Retired a few years",2],["Helping a parent or family member plan",0] ] },
        // Q3 proximity to the trigger event — PIVOTAL, ceiling 0-5
        { q:"How close are you to retirement?",
          opts:[ ["Already retired",4],["Within 5 years",5],["5 to 10 years out",3],["More than 10 years away",0] ] },
        // Q4 scale / stakes — PIVOTAL, ceiling 0-5
        { q:"Roughly, what have you built for retirement (savings + investments)?",
          opts:[ ["Under $500k",0],["$500k to $1M",2],["$1M to $3M",5],["$3M or more",5] ] },
        // Q5 which fear bites hardest — ordinary, ceiling 0-3
        { q:"When you picture retirement, what nags at you most?",
          opts:[ ["Running out of money",3],["Paying more tax than I need to",3],["A market crash at the wrong time",3],["Leaving my family a mess",2] ] },
        // Q6 self-assessed confidence (low confidence = high fit) — ordinary, ceiling 0-3
        { q:"How confident are you that you know your safe yearly spending number, the amount you can spend and never run out?",
          opts:[ ["Very confident, I know my number",0],["Somewhat, but I'm not sure it's right",2],["Not really",3],["Honestly, no one has ever given me a number",3] ] },
        // Q7 intent — PIVOTAL, ceiling 0-5
        { q:"If a specialist could show you your exact safe spending number, coordinating your taxes, income, and market risk, would that be worth a conversation?",
          opts:[ ["Yes, I'd genuinely value that",5],["Maybe, if it's the right fit",3],["Just here for the training for now",0] ] }
      ],
      // max score = 1+3+5+5+3+3+5 = 25; QUALIFY 16 (~64%, top third) so only strong-fit clear it.
      qualify: 16
    };

    // ========================================================================
    // ENGINE — do not edit per prospect. Reads everything from SURVEY above.
    // ========================================================================
    const QUESTIONS = SURVEY.questions;
    const QUALIFY = SURVEY.qualify;

    let idx = 0; const answers = new Array(QUESTIONS.length).fill(null);
    const elQuiz=document.getElementById('quiz'), elNum=document.getElementById('qnum'),
          elText=document.getElementById('qtext'), elOpts=document.getElementById('opts'),
          elBack=document.getElementById('back'), elFill=document.getElementById('pfill'),
          elCount=document.getElementById('pcount'), elComplete=document.getElementById('completeBtn');

    function render(){
      const Q = QUESTIONS[idx];
      const isLast = idx === QUESTIONS.length-1;
      elNum.textContent = "Question " + (idx+1);
      elText.textContent = Q.q;
      elCount.textContent = "Question " + (idx+1) + " of " + QUESTIONS.length;
      elFill.style.width = ((idx)/QUESTIONS.length*100) + "%";
      elBack.disabled = idx===0;
      // last question: reveal the "Complete Survey" button; enable once an answer is picked
      elComplete.style.display = isLast ? "block" : "none";
      elComplete.disabled = answers[idx]===null;
      elOpts.innerHTML = "";
      Q.opts.forEach(function(o,i){
        const b=document.createElement('button');
        b.className="opt"+(answers[idx]===i?" sel":"");
        b.innerHTML='<span class="dot"></span><span>'+o[0]+'</span>';
        b.onclick=function(){ answers[idx]=i; choose(); };
        elOpts.appendChild(b);
      });
    }
    function choose(){
      // last question: reflect the selection and wait for the "Complete Survey" click.
      // earlier questions: auto-advance after a beat.
      if(idx < QUESTIONS.length-1){
        render();
        setTimeout(function(){ idx++; render(); }, 230);
      } else {
        render();
      }
    }
    elBack.onclick=function(){ if(idx>0){ idx--; render(); } };
    elComplete.onclick=function(){ finish(); };

    // Step 3: on completion, redirect. Both thank-you pages fire the Meta "Lead"
    // event on load, so scoring here only decides WHICH page (call vs plain), not
    // whether a conversion is recorded. Carry the lead's first-party data forward.
    function goTo(page){
      var qs = '';
      try{ qs = window.location.search || ''; }catch(e){}
      window.location.href = page + qs;
    }
    function finish(){
      let score=0; answers.forEach(function(a,i){ if(a!==null) score+=QUESTIONS[i].opts[a][1]; });
      if(score >= QUALIFY){ goTo('webinar-thank-you-call.html'); }  // qualified -> thank-you + book-a-call
      else                { goTo('webinar-thank-you.html'); }        // everyone else -> plain thank-you
    }
    render();
  </script>

  <!-- Auto-height reporter: when embedded (e.g. the Phase 4 showroom), post this page's height
       to the parent so the iframe sizes to fit (no inner scrollbar). Harmless when standalone. -->
  <script>
  (function(){
    if(window.parent===window) return;
    function H(){return Math.max(document.documentElement.scrollHeight, document.body?document.body.scrollHeight:0);}
    function post(){try{window.parent.postMessage({type:'d100-embed-height',height:H()},'*');}catch(e){}}
    window.addEventListener('load',post); window.addEventListener('resize',post);
    if(window.ResizeObserver){try{new ResizeObserver(post).observe(document.documentElement);}catch(e){}}
    var n=0,iv=setInterval(function(){post(); if(++n>20)clearInterval(iv);},500); post();
  })();
  </script>
</body>
</html>
